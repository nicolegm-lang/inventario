{% extends "base.html" %}
{% block title %}Crear cuenta{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Crear cuenta</h1>
    <p>El nuevo usuario podrá consultar y modificar inventario.</p>
  </div>
</section>

<form method="post" class="form card">
  <label>Nombre</label>
  <input name="name" required>

  <label>Correo</label>
  <input type="email" name="email" required>

  <label>Contraseña temporal</label>
  <input type="password" name="password" required minlength="6">

  <label>Rol</label>
  <select name="role">
    <option value="usuario">Usuario de laboratorio</option>
    <option value="admin">Administrador</option>
  </select>

  <div class="actions">
    <button type="submit" class="primary">Crear cuenta</button>
    <a href="{{ url_for('users') }}" class="button">Cancelar</a>
  </div>
</form>
{% endblock %}
