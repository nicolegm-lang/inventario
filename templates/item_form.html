{% extends "base.html" %}
{% block title %}{{ 'Editar producto' if item else 'Nuevo producto' }}{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>{{ 'Editar producto' if item else 'Nuevo producto' }}</h1>
    <p>Registra los datos principales del material o reactivo.</p>
  </div>
</section>

<form method="post" class="form card wide">
  <div class="grid-two">
    <div>
      <label>Nombre *</label>
      <input name="name" required value="{{ item.name if item else '' }}" placeholder="Ej. Etanol absoluto">
    </div>
    <div>
      <label>Categoría</label>
      <input name="category" value="{{ item.category if item else '' }}" placeholder="Reactivo, consumible, equipo...">
    </div>
  </div>

  <label>Descripción</label>
  <textarea name="description" rows="3">{{ item.description if item else '' }}</textarea>

  <div class="grid-three">
    {% if not item %}
    <div>
      <label>Cantidad inicial</label>
      <input type="number" step="0.01" name="quantity" value="0">
    </div>
    {% endif %}
    <div>
      <label>Unidad</label>
      <input name="unit" value="{{ item.unit if item else 'pieza' }}" placeholder="ml, g, caja, pieza">
    </div>
    <div>
      <label>Stock mínimo</label>
      <input type="number" step="0.01" name="minimum_stock" value="{{ item.minimum_stock if item else 0 }}">
    </div>
  </div>

  <div class="grid-two">
    <div>
      <label>Ubicación</label>
      <input name="location" value="{{ item.location if item else '' }}" placeholder="Refrigerador 2, gaveta B...">
    </div>
    <div>
      <label>Lote</label>
      <input name="batch" value="{{ item.batch if item else '' }}">
    </div>
  </div>

  <div class="grid-three">
    <div>
      <label>Fecha de caducidad</label>
      <input type="date" name="expiration_date" value="{{ item.expiration_date if item else '' }}">
    </div>
    <div>
      <label>Proveedor</label>
      <input name="provider" value="{{ item.provider if item else '' }}">
    </div>
    <div>
      <label>Estado</label>
      <select name="status">
        {% set status = item.status if item else 'Disponible' %}
        {% for option in ['Disponible', 'Agotado', 'En revisión', 'Caducado', 'Baja'] %}
          <option value="{{ option }}" {% if status == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="actions">
    <button type="submit" class="primary">Guardar</button>
    <a href="{{ url_for('index') }}" class="button">Cancelar</a>
  </div>
</form>
{% endblock %}
