services:
  - type: web
    name: inventario-laboratorio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/lab_inventory.db
      - key: FLASK_DEBUG
        value: "0"
    disk:
      name: lab-inventory-data
      mountPath: /var/data
      sizeGB: 1
