<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventario de Laboratorio</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <section class="loading-card">
      <div class="loader"></div>
      <p>Cargando inventario...</p>
    </section>
  </div>

  <template id="auth-template">
    <main class="auth-layout">
      <section class="auth-card">
        <div class="brand">
          <div class="brand-mark">LAB</div>
          <div>
            <h1>Inventario de Laboratorio</h1>
            <p>Control colaborativo de reactivos, materiales y consumibles.</p>
          </div>
        </div>

        <div class="notice info" id="configNotice" hidden>
          Falta configurar Supabase. Abre <strong>config.js</strong> y pega tu Project URL y anon key, o usa el formulario de configuración local.
        </div>

        <div class="tabs">
          <button class="tab active" data-auth-tab="login">Entrar</button>
          <button class="tab" data-auth-tab="register">Registrarme</button>
          <button class="tab" data-auth-tab="setup">Config local</button>
        </div>

        <form id="loginForm" class="panel active">
          <label>Correo
            <input type="email" id="loginEmail" autocomplete="email" required />
          </label>
          <label>Contraseña
            <input type="password" id="loginPassword" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Iniciar sesión</button>
          <p class="muted small">La cuenta debe estar autorizada por un administrador del laboratorio.</p>
        </form>

        <form id="registerForm" class="panel">
          <label>Nombre
            <input type="text" id="registerName" autocomplete="name" required />
          </label>
          <label>Correo
            <input type="email" id="registerEmail" autocomplete="email" required />
          </label>
          <label>Contraseña
            <input type="password" id="registerPassword" autocomplete="new-password" minlength="8" required />
          </label>
          <button class="primary" type="submit">Crear mi cuenta</button>
          <p class="muted small">Primero un administrador debe autorizar tu correo dentro de la app.</p>
        </form>

        <form id="setupForm" class="panel">
          <label>Supabase Project URL
            <input type="url" id="setupUrl" placeholder="https://xxxxx.supabase.co" />
          </label>
          <label>Supabase anon public key
            <textarea id="setupKey" rows="4" placeholder="eyJhbGciOi..."></textarea>
          </label>
          <button class="secondary" type="submit">Guardar configuración local</button>
          <button class="ghost" type="button" id="clearSetupBtn">Borrar configuración local</button>
          <p class="muted small">Esto se guarda solo en este navegador. Para producción, edita <strong>config.js</strong>.</p>
        </form>
      </section>
    </main>
  </template>

  <template id="main-template">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand compact">
          <div class="brand-mark">LAB</div>
          <div>
            <h1>Inventario</h1>
            <p id="roleBadge">Cargando...</p>
          </div>
        </div>
        <nav>
          <button class="nav active" data-view="dashboard">Resumen</button>
          <button class="nav" data-view="inventory">Inventario</button>
          <button class="nav" data-view="movement">Registrar movimiento</button>
          <button class="nav" data-view="history">Historial</button>
          <button class="nav admin-only" data-view="users">Usuarios</button>
          <button class="nav" data-view="account">Mi cuenta</button>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <h2 id="viewTitle">Resumen</h2>
            <p class="muted" id="userInfo">Sesión activa</p>
          </div>
          <button id="logoutBtn" class="ghost">Cerrar sesión</button>
        </header>

        <div id="toast" class="toast" hidden></div>

        <section id="inactiveView" class="view" hidden>
          <div class="empty-state warning-box">
            <h3>Cuenta pendiente de autorización</h3>
            <p>Tu usuario existe en Supabase, pero aún no está activo dentro del inventario. Pide al administrador que autorice tu correo.</p>
          </div>
        </section>

        <section id="dashboardView" class="view active">
          <div class="cards">
            <article class="stat-card"><span>Total de ítems</span><strong id="statItems">0</strong></article>
            <article class="stat-card"><span>Bajo stock</span><strong id="statLow">0</strong></article>
            <article class="stat-card"><span>Por caducar</span><strong id="statExpiring">0</strong></article>
            <article class="stat-card"><span>Movimientos</span><strong id="statMovements">0</strong></article>
          </div>
          <div class="grid two">
            <section class="card">
              <h3>Alertas de bajo stock</h3>
              <div id="lowStockList" class="list"></div>
            </section>
            <section class="card">
              <h3>Caducidad próxima</h3>
              <div id="expiringList" class="list"></div>
            </section>
          </div>
        </section>

        <section id="inventoryView" class="view">
          <div class="toolbar">
            <input type="search" id="inventorySearch" placeholder="Buscar por nombre, categoría, lote, ubicación..." />
            <button id="newItemBtn" class="primary">Agregar producto</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Categoría</th>
                  <th>Cantidad</th>
                  <th>Ubicación</th>
                  <th>Lote</th>
                  <th>Caducidad</th>
                  <th>Estado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </section>

        <section id="movementView" class="view">
          <section class="card narrow">
            <h3>Registrar entrada, salida, ajuste o baja</h3>
            <form id="movementForm" class="form-grid">
              <label>Producto
                <select id="movementItem" required></select>
              </label>
              <label>Tipo de movimiento
                <select id="movementType" required>
                  <option value="entrada">Entrada</option>
                  <option value="salida">Salida</option>
                  <option value="ajuste">Ajuste / conteo físico</option>
                  <option value="baja">Baja</option>
                </select>
              </label>
              <label id="movementQuantityLabel">Cantidad
                <input type="number" id="movementQuantity" min="0" step="0.0001" required />
              </label>
              <label>Motivo
                <input type="text" id="movementReason" placeholder="Uso en práctica, compra, caducidad, corrección..." required />
              </label>
              <label class="full">Observaciones
                <textarea id="movementNotes" rows="3"></textarea>
              </label>
              <button class="primary" type="submit">Guardar movimiento</button>
            </form>
          </section>
        </section>

        <section id="historyView" class="view">
          <div class="toolbar">
            <input type="search" id="historySearch" placeholder="Buscar en historial..." />
            <button id="refreshHistoryBtn" class="secondary">Actualizar</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Producto</th>
                  <th>Tipo</th>
                  <th>Cantidad</th>
                  <th>Antes</th>
                  <th>Después</th>
                  <th>Usuario</th>
                  <th>Motivo</th>
                </tr>
              </thead>
              <tbody id="historyTable"></tbody>
            </table>
          </div>
        </section>

        <section id="usersView" class="view admin-only">
          <div class="grid two">
            <section class="card">
              <h3>Autorizar nuevo correo</h3>
              <form id="allowedForm" class="form-grid">
                <label>Nombre
                  <input type="text" id="allowedName" required />
                </label>
                <label>Correo
                  <input type="email" id="allowedEmail" required />
                </label>
                <label>Rol
                  <select id="allowedRole">
                    <option value="usuario">Usuario</option>
                    <option value="admin">Administrador</option>
                  </select>
                </label>
                <button class="primary" type="submit">Autorizar correo</button>
              </form>
              <p class="muted small">Después de autorizar el correo, la persona puede registrarse desde la pantalla inicial.</p>
            </section>
            <section class="card">
              <h3>Usuarios registrados</h3>
              <div id="profilesList" class="list"></div>
            </section>
          </div>
          <section class="card">
            <h3>Correos autorizados</h3>
            <div id="allowedList" class="list"></div>
          </section>
        </section>

        <section id="accountView" class="view">
          <div class="grid two">
            <section class="card">
              <h3>Mi perfil</h3>
              <div id="profileDetails" class="details"></div>
            </section>
            <section class="card">
              <h3>Cambiar contraseña</h3>
              <form id="passwordForm" class="form-grid">
                <label>Nueva contraseña
                  <input type="password" id="newPassword" minlength="8" required />
                </label>
                <button class="primary" type="submit">Actualizar contraseña</button>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog id="itemDialog">
      <form method="dialog" id="itemForm" class="dialog-card">
        <header>
          <h3 id="itemDialogTitle">Agregar producto</h3>
          <button class="ghost icon" value="cancel" type="button" id="closeItemDialog">×</button>
        </header>
        <input type="hidden" id="itemId" />
        <div class="form-grid">
          <label>Nombre
            <input id="itemName" required />
          </label>
          <label>Categoría
            <input id="itemCategory" placeholder="Reactivo, consumible, equipo..." />
          </label>
          <label>Cantidad actual
            <input type="number" id="itemQuantity" min="0" step="0.0001" required />
          </label>
          <label>Unidad
            <input id="itemUnit" placeholder="ml, g, piezas, cajas..." required />
          </label>
          <label>Stock mínimo
            <input type="number" id="itemMinStock" min="0" step="0.0001" />
          </label>
          <label>Ubicación
            <input id="itemLocation" placeholder="Refrigerador 2, almacén, estante B..." />
          </label>
          <label>Lote
            <input id="itemLot" />
          </label>
          <label>Caducidad
            <input type="date" id="itemExpiration" />
          </label>
          <label>Proveedor
            <input id="itemProvider" />
          </label>
          <label>Estado
            <select id="itemStatus">
              <option value="disponible">Disponible</option>
              <option value="agotado">Agotado</option>
              <option value="en_revision">En revisión</option>
              <option value="caducado">Caducado</option>
              <option value="baja">Baja</option>
            </select>
          </label>
          <label class="full">Descripción / observaciones
            <textarea id="itemDescription" rows="3"></textarea>
          </label>
        </div>
        <footer>
          <button class="ghost" type="button" id="cancelItemBtn">Cancelar</button>
          <button class="primary" type="submit">Guardar</button>
        </footer>
      </form>
    </dialog>
  </template>

  <script src="config.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
